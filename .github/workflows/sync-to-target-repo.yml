name: Sync to target repository

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to target repository
        env:
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          set -e

          if [ -z "$TARGET_REPO_TOKEN" ]; then
            echo "TARGET_REPO_TOKEN is missing or empty"
            exit 1
          fi

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git remote remove target 2>/dev/null || true
          git remote add target "https://x-access-token:${TARGET_REPO_TOKEN}@github.com/developeremaar/case-management-vercel.git"

          git push target HEAD:main --force
